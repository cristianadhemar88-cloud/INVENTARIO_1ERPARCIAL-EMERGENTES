{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mt-4">Lista de Productos</h2>

<a href="/agregar" class="btn btn-success mb-3">Agregar Producto</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>

    {% for p in productos %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>{{ p[4] }}</td>
        <td>
            <a href="/editar/{{ p[0] }}" class="btn btn-warning">Editar</a>
            <a href="/eliminar/{{ p[0] }}" class="btn btn-danger">Eliminar</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
