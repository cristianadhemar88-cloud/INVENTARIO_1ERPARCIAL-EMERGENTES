{% extends 'base.html' %}

{% block content %}

<div class="card p-4">
    <h3>Editar Producto</h3>

    <form method="POST">
        <input type="text" name="nombre" value="{{ producto[1] }}" class="form-control mb-2" required>
        <input type="text" name="categoria" value="{{ producto[2] }}" class="form-control mb-2" required>
        <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" class="form-control mb-2" required>
        <input type="number" name="stock" value="{{ producto[4] }}" class="form-control mb-2" required>

        <button class="btn btn-warning">Actualizar</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
